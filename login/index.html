<!DOCTYPE html><html lang="pt"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Quaresma de Padre Pio</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1a365d 0%, #0f2042 100%);
      font-family: 'Lato', sans-serif;
      color: #fff;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      width: 100%;
      max-width: 410px;
      background: rgba(18, 32, 60, 0.65);
      border-radius: 22px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      padding: 44px 32px 32px 32px;
      backdrop-filter: blur(10px) saturate(140%);
      border: 1.5px solid rgba(255,255,255,0.13);
      position: relative;
      z-index: 2;
    }
    .login-title {
      font-family: 'Cinzel', serif;
      color: #ffd700;
      font-size: 2.1rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px #00000033;
    }
    .login-desc {
      color: #e6e6e6;
      text-align: center;
      margin-bottom: 26px;
      font-size: 1.09rem;
    }
    .form-label {
      color: #ffd700;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .form-control {
      border-radius: 10px;
      border: 1.5px solid #ffd6d6;
      font-size: 1.08rem;
      background: rgba(255,255,255,0.08);
      color: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .form-control:focus {
      border-color: #ffd700;
      box-shadow: 0 0 0 2px #ffeaea;
      background: rgba(255,255,255,0.13);
      color: #fff;
    }
    .btn-login {
      background: linear-gradient(90deg, #ffd700 0%, #f5e290 100%);
      color: #0f2042;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.13rem;
      padding: 13px 0;
      width: 100%;
      box-shadow: 0 4px 18px rgba(212,175,55,0.13);
      margin-top: 12px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s, box-shadow 0.2s;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      left: -75%;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.01) 100%);
      transform: skewX(-25deg);
      transition: left 0.5s;
      z-index: 1;
    }
    .btn-login:hover, .btn-login:focus {
      background: linear-gradient(90deg, #ffe066 0%, #ffd700 100%);
      color: #0f2042;
      box-shadow: 0 6px 24px rgba(212,175,55,0.18);
      transform: translateY(-2px) scale(1.03);
    }
    .btn-login:hover::after {
      left: 120%;
    }
    .login-footer {
      text-align: center;
      color: #aaa;
      font-size: 1.01rem;
      margin-top: 32px;
      letter-spacing: 0.1px;
    }
    .login-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }
    .login-icon i {
      font-size: 3.3rem;
      color: #ffd700;
      filter: drop-shadow(0 2px 8px #00000033);
    }
    @media (max-width: 600px) {
      .login-container { padding: 22px 8px 18px 8px; }
      .login-title { font-size: 1.5rem; }
      .login-icon i { font-size: 2.2rem; }
    }
    /* Efeito de brilho sutil no fundo */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 70% 20%, #ffd70022 0%, transparent 60%),
                  radial-gradient(circle at 20% 80%, #d4af3722 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<!-- ds -->
<body>
  <div class="login-container">
    <div class="login-icon">
      <i class="fas fa-user-circle"></i>
    </div>
    <div class="login-title">Bem-vindo!</div>
    <div class="login-desc">Acesse a Quaresma de Padre Pio digitando seu e-mail abaixo.</div>
    <form id="loginForm" autocomplete="off">
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Digite seu e-mail" required="">
      </div>
      <button type="submit" class="btn btn-login"><i class="fas fa-sign-in-alt me-2"></i>Entrar</button>
    </form>
    <div class="login-footer mt-4">© 2025 Quaresma de Padre Pio</div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = 'https://prosperidadesjudaica.site/inicio-oracoes-principal';
    });
  </script>

 </body></html>
